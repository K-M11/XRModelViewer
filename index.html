<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XR VRM Viewer</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #16181d;
        color: #f5f7fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
      }

      .panel {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        display: grid;
        gap: 10px;
        width: min(420px, calc(100vw - 32px));
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(18, 20, 25, 0.78);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(12px);
      }

      .panel h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      input,
      button {
        min-width: 0;
        height: 38px;
        border-radius: 6px;
        font: inherit;
      }

      input[type="url"] {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        padding: 0 10px;
      }

      input[type="file"] {
        height: auto;
        color: #d9e0ee;
      }

      button {
        border: 0;
        background: #7dd3fc;
        color: #09111a;
        padding: 0 12px;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }

      .hint,
      .status {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        color: #c9d4e5;
      }

      .status {
        color: #f8df9b;
      }

      @media (max-width: 560px) {
        .controls {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.2/lib/three-vrm.module.min.js",
          "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3.5.2/lib/three-vrm-animation.module.min.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="panel" aria-label="VRM viewer controls">
      <h1>XR VRM Viewer</h1>

      <label>
        <span class="hint">Local VRM</span>
        <input id="fileInput" type="file" accept=".vrm,model/gltf-binary" />
      </label>

      <label>
        <span class="hint">Local VRMA Animation</span>
        <input id="vrmaInput" type="file" accept=".vrma,model/gltf-binary" />
      </label>

      <div class="controls">
        <input
          id="urlInput"
          type="url"
          placeholder="https://example.com/avatar.vrm"
          autocomplete="off"
        />
        <button id="loadUrlButton" type="button">Load URL</button>
      </div>

      <button id="lockPointerButton" class="secondary" type="button">
        Mouse Look
      </button>

      <div class="controls">
        <button id="playAnimationButton" class="secondary" type="button">
          Play Animation
        </button>
        <button id="stopAnimationButton" class="secondary" type="button">
          Stop
        </button>
      </div>

      <p class="hint">Move with WASD or arrow keys. Press Esc to release mouse look.</p>
      <p id="status" class="status">Choose a local VRM file or load one from a URL.</p>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
